// IndexedDB гӮёгғЈгғјгғҠгғ«
// ===================================================
const JournalDB = (() => {
  const DB_NAME = 'pos_journal_db'
  const STORE = 'journal'
  let _db = null

  function _open() {
    return new Promise((resolve, reject) => {
      if (_db) { resolve(_db); return }
      const req = indexedDB.open(DB_NAME, 1)
      req.onupgradeneeded = e => {
        const d = e.target.result
        if (!d.objectStoreNames.contains(STORE)) {
          const store = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true })
          store.createIndex('month', 'month', { unique: false })
        }
      }
      req.onsuccess = e => { _db = e.target.result; resolve(_db) }
      req.onerror = e => reject(e.target.error)
    })
  }

  async function appendRows(month, rows) {
    const d = await _open()
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readwrite')
      const store = tx.objectStore(STORE)
      rows.forEach(r => store.add(Object.assign({}, r, { month })))
      tx.oncomplete = resolve
      tx.onerror = e => reject(e.target.error)
    })
  }

  async function getMonth(month) {
    const d = await _open()
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readonly')
      const store = tx.objectStore(STORE)
      const idx = store.index('month')
      const req = idx.getAll(month)
      req.onsuccess = () => resolve(req.result)
      req.onerror = e => reject(e.target.error)
    })
  }

  async function exportCsv(month) {
    const rows = await getMonth(month)
    if (!rows.length) { alert('гғҒEҒEгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“ҒEҒE + month); return }
    let csv = 'ҒEҝж—ҘжҷҒEжіЁж–ҒE•ӘеҸ·,е•ҒE“ҒеҗҒEйҮ‘йЎҒEдјҡиЁҲеҗҲиЁҒEn'
    rows.forEach(r => {
      csv += csvField(r.datetime) + ',' + csvField(r.order) + ',' + csvField(r.name) + ',' + csvField(r.price) + ',' + csvField(r.total) + '\n'
    })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }))
    a.download = 'journal_' + month + '.csv'
    a.click()
  }

  return { appendRows, getMonth, exportCsv }
})()

  if(!kinds.has(name) && kinds.size>=10)return
  items.push({name,price})
  update()
}

function removeItem(){
  items=[];money=""
  update();updateMoney()
}

function update(){
  const list=document.getElementById("list")
  list.innerHTML=""
  total=0
  const grouped=[]
  items.forEach(i=>{
    total+=i.price
    const found=grouped.find(g=>g.name===i.name&&g.unitPrice===i.price)
    if(found){found.qty++;found.subtotal+=i.price}
    else grouped.push({name:i.name,unitPrice:i.price,qty:1,subtotal:i.price})
  })
  grouped.forEach(g=>{
    const qtyStr=g.qty>1?" ГҒE+g.qty:""
    list.innerHTML+=`<div class="row"><span>${g.name}${qtyStr}</span><span>${g.subtotal}</span></div>`
  })
  document.getElementById("total").innerText="еҗҲиЁҒE"+total
  calcChange()
}

function updateMoney(){
  let m=parseInt(money)||0
  document.getElementById("money").innerText="й җгӮҠйҮҒE"+m
  calcChange()
}

function calcChange(){
  let m=parseInt(money)||0
  let c=m-total
  if(c<0)c=0
  document.getElementById("change").innerText="гҒҠйҒEгӮҒE"+c
}

function checkout(){
  let currentOrder=getAndIncrementOrderNumber()
  printReceipt(currentOrder,items,total)
  todayTotal+=total
  localStorage.setItem("pos_total",todayTotal)
  let now=new Date()
  let dateStr=now.getFullYear()+"/"+(now.getMonth()+1).toString().padStart(2,"0")+"/"+now.getDate().toString().padStart(2,"0")
  let timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")+":"+now.getSeconds().toString().padStart(2,"0")
  items.forEach(i=>{
    todayDetails.push({datetime:dateStr+" "+timeStr,order:currentOrder,name:i.name,price:i.price})
  })
  localStorage.setItem("pos_details",JSON.stringify(todayDetails))
  let journalMonth=dateStr.slice(0,7).replace("/","-")
  let journalRows=""
  items.forEach(i=>{
    journalRows+=csvField(dateStr+" "+timeStr)+","+csvField(currentOrder)+","+csvField(i.name)+","+csvField(i.price)+","+csvField(total)+"\n"
  })
  if(window.electronAPI && window.electronAPI.appendJournal){
    window.electronAPI.appendJournal(journalMonth, journalRows)
  } else {
    const journalEntries=items.map(i=>({datetime:dateStr+" "+timeStr,order:currentOrder,name:i.name,price:i.price,total:total}))
    JournalDB.appendRows(journalMonth, journalEntries)
  }
  items=[];money=""
  update();updateMoney()
}

function eposConnect(ip,callback){
  if(typeof epson==='undefined'){callback(null,'SDK_NOT_FOUND');return}
  const useSsl=location.protocol==='https:'
  const port=useSsl?8043:8008
  const dev=new epson.ePOSDevice()
  dev.connect(ip,port,(data)=>{
    if(data!=='OK'&&data!=='SSL_CONNECT_OK'){callback(null,data);return}
    dev.createDevice('local_printer',dev.DEVICE_TYPE_PRINTER,
      {crypto:useSsl,buffer:false},
      (printer,code)=>{
        if(code!=='OK'){callback(null,code);return}
        callback({dev,printer},null)
      }
    )
  })
}

function eposDisconnect(handle){
  try{handle.dev.deleteDevice(handle.printer,()=>handle.dev.disconnect())}catch(e){}
}

function buildEposReceipt(printer,orderNum,printItems,printTotal){
  const cols=receiptWidth===58?32:42
  function lr(l,r,w){const p=Math.max(1,w-l.length-r.length);return l+' '.repeat(p)+r}
  const now=new Date()
  const dateStr=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')
  const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0')
  const tax=Math.round(printTotal*8/108)
  const divider='-'.repeat(cols)
  const grouped=[]
  printItems.forEach(i=>{
    const found=grouped.find(g=>g.name===i.name&&g.unitPrice===i.price)
    if(found){found.qty++;found.subtotal+=i.price}
    else grouped.push({name:i.name,unitPrice:i.price,qty:1,subtotal:i.price})
  })
  printer.addTextLang('ja')
  printer.addTextSmooth(true)
  printer.addTextAlign(printer.ALIGN_CENTER)
  printer.addTextDouble(true,true)
  printer.addText(shopName+'\n')
  printer.addTextDouble(false,false)
  printer.addText(dateStr+' '+timeStr+'\n')
  printer.addText(divider+'\n')
  printer.addText('гҒҠеҸ—гҒ‘еҸ–гӮҠз•ӘеҸ·\n')
  printer.addTextSize(4,4)
  printer.addText(String(orderNum)+'\n')
  printer.addTextSize(1,1)
  printer.addText(divider+'\n')
  printer.addTextAlign(printer.ALIGN_LEFT)
  printer.addText('гҖҗгҒҠе®ўж§ҳжҺ§гҒҲгҖ‘\n')
  grouped.forEach(g=>{
    const lbl=g.name+(g.qty>1?' x'+g.qty:'')
    printer.addText(lr(lbl,'ВҘ'+g.subtotal,cols)+'\n')
  })
  printer.addText(divider+'\n')
  printer.addTextAlign(printer.ALIGN_RIGHT)
  printer.addTextDouble(true,true)
  printer.addText('еҗҲиЁҒEВҘ'+printTotal+'\n')
  printer.addTextDouble(false,false)
  printer.addText('еҶҒE¶ҲиІ»зЁҒE%ҒEҲи»ҪжёӣзЁҺзҺҮҒEүВҘ'+tax+'\n')
  printer.addTextAlign(printer.ALIGN_LEFT)
  printer.addText(divider+'\n')
  printer.addText('гҖҗеә—иҒEжҺ§гҒҲгҖҒENo.'+orderNum+' еҗҲиЁҒEВҘ'+printTotal+'\n')
  printer.addText(divider+'\n')
  printer.addFeedLine(3)
  printer.addCut(printer.CUT_FEED)
}

function sendToEposPrinter(ip,orderNum,printItems,printTotal){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error('гғ—гғӘгғігӮҝгғјжҺҘз¶ҡгӮҝгӮӨгғ гӮўгӮҰгғҒEnIPгӮўгғүгғ¬гӮ№гҒЁйӣ»жәҗгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„')),10000)
    eposConnect(ip,(handle,err)=>{
      if(err){
        clearTimeout(timer)
        const msg=err==='SDK_NOT_FOUND'?'epos.jsгҒҢиӘӯгҒҝиҫјгҒҫгӮҢгҒҰгҒҒEҒҫгҒӣгӮ“':'гғ—гғӘгғігӮҝгғјжҺҘз¶ҡеӨұж•ҒE '+err
        reject(new Error(msg));return
      }
      handle.printer.onreceive=(res)=>{
        clearTimeout(timer)
        eposDisconnect(handle)
        if(res.success)resolve()
        else reject(new Error('еҚ°еҲ·еӨұж•ҒE('+res.code+')'))
      }
      handle.printer.onerror=()=>{clearTimeout(timer);reject(new Error('гғ—гғӘгғігӮҝгғјгӮЁгғ©гғј'))}
      buildEposReceipt(handle.printer,orderNum,printItems,printTotal)
      handle.printer.send()
    })
  })
}

    handle.printer.onerror=()=>{eposDisconnect(handle);alert('еҚ°еҲ·гӮЁгғ©гғј: гғ—гғӘгғігӮҝгғјгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„')}

    handle.printer.addFeedLine(3)
    handle.printer.addCut(handle.printer.CUT_FEED)
    handle.printer.send()
  })
}

let _xData=[], _xTotal={amount:0,qty:0,orderCount:0}

function xReport(){
  const details=JSON.parse(localStorage.getItem("pos_details"))||[]
  const itemMap={}, orderSet=new Set()
  details.forEach(r=>{
    orderSet.add(r.order)
    if(!itemMap[r.name])itemMap[r.name]={name:r.name,qty:0,amount:0}
    itemMap[r.name].qty++
    itemMap[r.name].amount+=parseInt(r.price)||0
  })
  _xData=Object.values(itemMap)
  _xTotal={
    amount:_xData.reduce((s,x)=>s+x.amount,0),
    qty:_xData.reduce((s,x)=>s+x.qty,0),
    orderCount:orderSet.size
  }
  const now=new Date()
  const dateStr=now.getFullYear()+"/"+(now.getMonth()+1).toString().padStart(2,"0")+"/"+now.getDate().toString().padStart(2,"0")
  const timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")
  document.getElementById('xModalSub').textContent=dateStr+" "+timeStr+" зҸҫеңЁ"
  document.getElementById('xSummaryCount').innerHTML='жіЁж–ҒE»¶ж•°<span>'+_xTotal.orderCount+' д»¶</span>'
  document.getElementById('xSummaryTotal').innerHTML='еЈІдёҠеҗҲиЁҒEspan>ВҘ'+_xTotal.amount.toLocaleString()+'</span>'
  document.getElementById('xSummaryTax').innerHTML='еҶҒE¶ҲиІ»зЁҒE%ҒEҲи»ҪжёӣзЁҺзҺҮҒEҒEspan>ВҘ'+Math.round(_xTotal.amount*8/108).toLocaleString()+'</span>'
  sortXReport('amount')
  document.getElementById('xModal').style.display='block'
}

function sortXReport(key){
  document.getElementById('xBtnAmount').classList.toggle('active',key==='amount')
  document.getElementById('xBtnQty').classList.toggle('active',key==='qty')
  const sorted=[..._xData].sort((a,b)=>b[key]-a[key])
  document.getElementById('xReportBody').innerHTML=sorted.map((x,i)=>
    `<tr><td class="rank">${i+1}</td><td>${x.name}</td><td class="num">${x.qty}</td><td class="num">ВҘ${x.amount.toLocaleString()}</td></tr>`
  ).join('')+`<tr class="total-row"><td></td><td>еҗҲгҖҖиЁҒE/td><td class="num">${_xTotal.qty}</td><td class="num">ВҘ${_xTotal.amount.toLocaleString()}</td></tr>`
}

  if('currentPage'in s){currentPage=s.currentPage;renderButtons()}
}

</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{})
}
fetch('version.json?t='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    const stored=localStorage.getItem('app_version')
    if(stored && stored!==data.v){
      localStorage.setItem('app_version',data.v)
      location.reload(true)
    } else {
      localStorage.setItem('app_version',data.v)
    }
  })
  .catch(()=>{})
</script>
</body>
